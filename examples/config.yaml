# Example aethra pipeline configuration.
#
# Use it from the command line:
#     aethra data.parquet --config config.yaml -o results.csv
#
# Or in Python:
#     from aethra import load_config, load_and_run
#     cfg = load_config("config.yaml")
#     results = load_and_run("data.parquet", cfg)
#
# Any key you omit falls back to the pipeline's built-in default. YAML `null`
# becomes Python None (e.g. `group_col: null` = one object per file).

# ── Required: column names ─────────────────────────────────────────────
time_col: bjd        # time column (e.g. barycentric Julian date)
mag_col: mag         # magnitude column
err_col: mag_err     # magnitude-uncertainty column

# ── Grouping & input parsing ───────────────────────────────────────────
group_col: name      # column identifying each object; null for one object per file
sep: '\s+'           # separator regex for text files (default: whitespace)
#header: 0          # header row index for text files (default: none)
columns: [bjd, mag, mag_err]   # column names when the file has no header

# ── Filters / achromatic test ──────────────────────────────────────────
filter_col: filt     # band column; null to skip the achromatic test
target_filter: W149
primary_filter: W149
secondary_filters: [Z087]

# ── Tuning ─────────────────────────────────────────────────────────────
min_points: 10
season_gap_days: 100
ffp_tE_max: 2.0
good_pspl_chi2: 2.5
chromatic_min_points: 5
fap_threshold: 0.01
